services:
  # ── Frontend (Static Site) ───────────────────────────────────────────────────
  - type: static
    name: simplefeed-frontend
    buildCommand: "npm install && npm run build"
    publishPath: "frontend/dist" # Adjust if your Vite config differs
    staticPublishPath: "./"

  # ── Web (Django API) ─────────────────────────────────────────────────────────
  - type: web
    name: simplefeed-web
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:10000"
    envVars:
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: REDIS_URL
        fromService:
          type: redis
          name: simplefeed-redis
          property: connectionString
      # ... [Keep your existing Shard DB EnvVars here] ...

  # ── Background Worker (Celery Fleet) ─────────────────────────────────────────
  - type: worker
    name: simplefeed-worker
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info"
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: simplefeed-redis
          property: connectionString
      - key: REPLICA_READ_PROBABILITY
        value: "0.0" 
      # ... [Keep your existing Shard DB EnvVars here] ...

  # ── Redis (Broker & Lock Manager) ──────────────────────────────────────────
  - type: redis
    name: simplefeed-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  # Default — Django internals only (auth, sessions, admin, contenttypes)
  - name: simplefeed-db-default
    plan: starter

  # Shard primaries
  - name: simplefeed-db-shard-0
    plan: starter
  - name: simplefeed-db-shard-1
    plan: starter
  - name: simplefeed-db-shard-2
    plan: starter

  # Read replicas
  - name: simplefeed-db-shard-0-replica
    plan: starter
  - name: simplefeed-db-shard-1-replica
    plan: starter
  - name: simplefeed-db-shard-2-replica
    plan: starter
