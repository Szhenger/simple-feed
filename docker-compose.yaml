version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: simplefeed_app
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simplefeed
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplefeed_app -d simplefeed"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  kernel:
    build: 
      context: ./kernel
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    # This represents the compiled C++20 gRPC binary

  api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 4
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - KERNEL_GRPC_TARGET=kernel:50051
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker --loglevel=info --concurrency=4
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - KERNEL_GRPC_TARGET=kernel:50051
    depends_on:
      - api
      - redis
      - kernel
    deploy:
      resources:
        reservations:
          # Required for the Sentence-Transformers AI triage
          memory: 2G 

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - DB_HOST=db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - worker

volumes:
  postgres_data:
