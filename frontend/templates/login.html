<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in — SimpleFeed++</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-viewport {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--main-bg);
        }

        .login-container {
            width: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 24px;
            user-select: none;
        }

        .login-container h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .notion-login-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.1s ease;
        }

        .notion-login-btn:hover {
            background-color: var(--sidebar-bg);
        }

        .login-divider {
            width: 100%;
            height: 1px;
            background: var(--border-color);
            margin: 20px 0;
            position: relative;
        }

        .login-divider::before {
            content: "or";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--main-bg);
            padding: 0 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .btn-submit-login {
            background: #2383e2;
            color: white;
            border: none;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn-submit-login:hover {
            background: #1a6cb8;
        }
    </style>
</head>
<body>

    <div class="login-viewport">
        <div class="login-container">
            <div class="login-logo">🚀</div>
            <h1>Think it through.</h1>
            <p class="login-subtitle">Log in to your SimpleFeed++ single-tenant workspace node.</p>

            <div class="login-form">
                <button class="notion-login-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V13.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l2.427-2.334C17.955 2.192 15.34 1 12.24 1 6.033 1 1 6.033 1 12.24s5.033 11.24 11.24 11.24c6.478 0 10.793-4.537 10.793-10.986 0-.743-.08-1.313-.178-1.879H12.24z"/></svg>
                    Continue with Google
                </button>
                
                <div class="login-divider"></div>

                <div style="text-align: left; width: 100%; display: flex; flex-direction: column; gap: 6px;">
                    <label style="font-size: 12px; color: var(--text-muted); font-weight: 500;">Email Address</label>
                    <input type="email" placeholder="Enter your email address..." class="notion-input" style="background: transparent;">
                </div>

                <button class="notion-login-btn btn-submit-login" onclick="window.location.href='index.html'">
                    Continue with Email
                </button>
            </div>
        </div>
    </div>

</body>
</html>
