syntax = "proto3";
package simplefeed.kernel;

// The strict contract between Python workers and the C++20 SIMD kernel
service SyndicationParser {
    rpc ParseStream (RawStreamRequest) returns (ParsedStreamResponse) {}
}

message RawStreamRequest {
    bytes payload = 1; // Raw XML/Atom bytes straight from the network
}

message FeedEntry {
    string guid = 1;
    string title = 2;
    string url = 3;
    string content = 4;
    string published_at = 5;
}

message ParsedStreamResponse {
    repeated FeedEntry entries = 1;
}
